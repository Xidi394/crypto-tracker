<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>花小寒实时行情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .up { color: #22c55e; } .down { color: #ef4444; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .price-zero { font-family: monospace; }
    </style>
</head>
<body class="bg-gray-900 text-white p-4">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold mb-4">实时行情监控 (Pro版)</h1>
        <input type="text" id="searchInput" placeholder="搜索币种..." class="w-full p-4 bg-gray-800 rounded-lg mb-4 border border-gray-700" onkeyup="renderTable()">
        
        <table class="w-full text-left bg-gray-800 rounded-xl overflow-hidden">
            <thead class="bg-gray-700 text-gray-300">
                <tr>
                    <th class="p-3">图标</th>
                    <th class="p-3 cursor-pointer" onclick="sortData('symbol')">名称 ↕</th>
                    <th class="p-3 cursor-pointer" onclick="sortData('current_price')">价格 ↕</th>
                    <th class="p-3 cursor-pointer" onclick="sortData('price_change_percentage_24h')">24h涨跌 ↕</th>
                </tr>
            </thead>
            <tbody id="body"></tbody>
        </table>
    </div>

    <div id="modal" class="modal" onclick="this.style.display='none'">
        <div class="bg-gray-900 p-8 rounded-2xl w-full max-w-lg border border-gray-700" onclick="event.stopPropagation()">
            <div id="m-content">正在载入详情...</div>
        </div>
    </div>

    <script>
        let allCoins = [];
        let sortKey = 'market_cap';
        let sortDirection = -1;

        // 核心：防封锁格式化函数 (处理 0.0000000X 情况)
        function formatPrice(p) {
            if (p === null || p === undefined) return 'N/A';
            return p < 0.001 ? p.toExponential(4) : '$' + p.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 8});
        }

        async function init() {
            const res = await fetch('https://bizhongxiangqing.xw31555.workers.dev/');
            allCoins = await res.json();
            renderTable();
            
            // WebSocket 实时更新 (只更新价格，不刷新全表，防止闪烁)
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/!ticker@arr');
            ws.onmessage = (e) => {
                JSON.parse(e.data).forEach(d => {
                    let coin = allCoins.find(c => c.symbol.toUpperCase() + 'USDT' === d.s);
                    if(coin) {
                        coin.current_price = parseFloat(d.c);
                        coin.price_change_percentage_24h = parseFloat(d.P);
                        updateRowUI(coin);
                    }
                });
            };
        }

        function updateRowUI(c) {
            const row = document.getElementById(c.id);
            if(row) {
                row.querySelector('.price-cell').innerText = formatPrice(c.current_price);
                row.querySelector('.change-cell').innerText = (c.price_change_percentage_24h || 0).toFixed(2) + '%';
            }
        }

        function sortData(key) {
            sortDirection *= -1;
            allCoins.sort((a, b) => (a[key] - b[key]) * sortDirection);
            renderTable();
        }

        function renderTable() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            document.getElementById('body').innerHTML = allCoins.filter(c => c.name.toLowerCase().includes(val) || c.symbol.toLowerCase().includes(val)).map(c => `
                <tr id="${c.id}" class="border-b border-gray-700 hover:bg-gray-700 cursor-pointer" onclick="showDetail('${c.id}')">
                    <td class="p-3"><img src="${c.image}" class="w-8 h-8 rounded-full" onerror="this.src='https://via.placeholder.com/32'"></td>
                    <td class="p-3 font-bold">${c.symbol.toUpperCase()}</td>
                    <td class="p-3 price-cell">${formatPrice(c.current_price)}</td>
                    <td class="p-3 change-cell ${c.price_change_percentage_24h >= 0 ? 'up' : 'down'}">${(c.price_change_percentage_24h || 0).toFixed(2)}%</td>
                </tr>`).join('');
        }

        function showDetail(id) {
            const c = allCoins.find(x => x.id === id);
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('m-content').innerHTML = `
                <h2 class="text-3xl font-bold mb-4">${c.name} (${c.symbol.toUpperCase()})</h2>
                <div class="grid grid-cols-2 gap-4 text-gray-300">
                    <p><b>实时价格:</b> ${formatPrice(c.current_price)}</p>
                    <p><b>流通市值:</b> $${c.market_cap?.toLocaleString()}</p>
                    <p><b>历史最高:</b> ${formatPrice(c.ath)}</p>
                    <p><b>历史最低:</b> ${formatPrice(c.atl)}</p>
                    <p><b>供应总量:</b> ${c.total_supply?.toLocaleString() || '∞'}</p>
                    <p><b>流通率:</b> ${((c.circulating_supply / c.total_supply) * 100 || 0).toFixed(2)}%</p>
                </div>
                <button onclick="document.getElementById('modal').style.display='none'" class="mt-6 w-full p-2 bg-blue-600 rounded">关闭</button>`;
        }
        init();
    </script>
</body>
</html>
